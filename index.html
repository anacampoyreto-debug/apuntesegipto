<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tema 2 · Mesopotamia y Egipto</title>
<style>
  :root{
    --bg:#f7f0e3;
    --bg2:#fbf7f0;
    --card:#fffaf2;
    --card2:#fcf5ea;
    --text:#3f2f22;
    --muted:#7d6a59;
    --line:#dfc9b1;
    --primary:#8c5e3c;
    --primary2:#b27b4f;
    --accent:#d7a54d;
    --ok:#3e7e50;
    --bad:#b14f4f;
    --shadow:0 14px 36px rgba(86,62,40,.10);
    --radius-xl:26px;
    --radius-lg:18px;
    --radius-md:12px;
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    color:var(--text);
  }

  .wrap{
    width:min(1180px,94vw);
    margin:0 auto;
    padding:20px 0 70px;
  }

  .hero{
    background:linear-gradient(135deg,#7a5437,#ab7449,#d7a54d);
    color:#fffaf3;
    border-radius:var(--radius-xl);
    padding:28px 24px;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .hero h1{
    margin:0 0 10px;
    font-size:clamp(1.8rem,3vw,2.8rem);
    line-height:1.1;
  }

  .hero p{
    margin:0;
    max-width:900px;
    line-height:1.55;
    color:#fff2e1;
  }

  .topbar{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:12px;
    align-items:center;
    margin-bottom:18px;
  }

  .box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
  }

  .progress-box{padding:14px 16px}

  .progress-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .pill{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    font-weight:700;
    font-size:.92rem;
    background:#f7efe2;
    border:1px solid #ead7bf;
    color:#6b4c34;
  }

  .bar{
    height:12px;
    background:#ebdfcf;
    border-radius:999px;
    overflow:hidden;
  }

  .bar span{
    display:block;
    width:0;
    height:100%;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    transition:width .3s ease;
  }

  .controls{
    display:flex;
    gap:10px;
    padding:10px;
  }

  .jump{
    padding:10px 12px;
    min-width:240px;
  }

  .jump label{
    display:block;
    margin-bottom:6px;
    font-size:.9rem;
    font-weight:700;
    color:var(--muted);
  }

  select,input[type="text"],textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:.95rem;
    background:white;
    color:var(--text);
    font-family:inherit;
  }

  textarea{
    min-height:86px;
    resize:vertical;
  }

  button{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s ease, opacity .2s ease;
  }

  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.55;cursor:not-allowed;transform:none}

  .btn-primary{background:var(--primary);color:white}
  .btn-secondary{background:#eadbc7;color:#5c4230}
  .btn-accent{background:var(--accent);color:#4a331d}

  .screen{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    box-shadow:var(--shadow);
    padding:22px;
  }

  .screen-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .screen-head h2{
    margin:0 0 6px;
    font-size:clamp(1.35rem,2vw,2rem);
    color:#5d412b;
  }

  .screen-head p{
    margin:0;
    color:var(--muted);
    max-width:850px;
    line-height:1.5;
  }

  .grid{
    display:grid;
    grid-template-columns:1.08fr .92fr;
    gap:18px;
  }

  .card{
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    padding:16px;
    margin-bottom:14px;
  }

  .card h3{
    margin:0 0 10px;
    font-size:1rem;
    color:#6a4930;
  }

  .lead{
    background:#fffaf3;
    line-height:1.66;
  }

  .lead ul{
    margin:8px 0 0 18px;
    padding:0;
  }

  .lead li{margin:4px 0}

  .blanks{
    display:grid;
    gap:10px;
  }

  .blank-row{
    display:grid;
    grid-template-columns:220px 1fr 130px;
    gap:10px;
    align-items:center;
  }

  .blank-row label{
    font-weight:700;
    color:#65472f;
  }

  .mini-state{
    font-size:.85rem;
    font-weight:700;
    text-align:center;
    border-radius:10px;
    padding:10px 8px;
    border:1px solid #e0ccb3;
    background:#fffaf4;
    color:var(--muted);
  }

  .mini-state.ok{
    background:#eef8f1;
    border-color:#bdddc5;
    color:var(--ok);
  }

  .mini-state.bad{
    background:#fff1ef;
    border-color:#efc2bc;
    color:var(--bad);
  }

  .question{
    padding:12px 0;
    border-top:1px dashed #dcc8b4;
  }

  .question:first-child{
    border-top:none;
    padding-top:0;
  }

  .question p{
    margin:0 0 10px;
    font-weight:700;
    line-height:1.45;
  }

  .options{
    display:grid;
    gap:8px;
  }

  .option{
    display:flex;
    gap:8px;
    align-items:flex-start;
    background:white;
    border:1px solid #ead9c6;
    border-radius:12px;
    padding:10px 12px;
  }

  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
  }

  .feedback{
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    font-weight:700;
    display:none;
  }

  .feedback.ok{
    display:block;
    background:#eef8f1;
    border:1px solid #bdddc5;
    color:var(--ok);
  }

  .feedback.bad{
    display:block;
    background:#fff1ef;
    border:1px solid #efc2bc;
    color:var(--bad);
  }

  .model{
    display:none;
    margin-top:8px;
    background:#fff7ea;
    border:1px solid #ebd4aa;
    border-radius:12px;
    padding:10px 12px;
  }

  .model.show{display:block}

  .challenge{
    background:linear-gradient(180deg,#fffaf3,#f8efdf);
  }

  .error-box{
    background:white;
    border:1px solid #e7d4b9;
    border-radius:14px;
    padding:12px;
    margin-top:8px;
  }

  .error-item{
    border-top:1px dashed #ddcab6;
    padding:10px 0;
  }

  .error-item:first-child{
    border-top:none;
    padding-top:0;
  }

  .small{
    color:var(--muted);
    font-size:.92rem;
    line-height:1.5;
  }

  .meta-nav{
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    margin-top:18px;
  }

  .footer{
    margin-top:18px;
    text-align:center;
    color:var(--muted);
    font-size:.92rem;
  }

  @media (max-width:980px){
    .topbar{grid-template-columns:1fr}
    .controls{justify-content:center;flex-wrap:wrap}
    .grid{grid-template-columns:1fr}
  }

  @media (max-width:640px){
    .screen{padding:16px}
    .blank-row{grid-template-columns:1fr}
    .controls button{flex:1 1 140px}
  }
</style>
</head>

const state = {
  current:0,
  done:new Set()
};

const screenContainer = document.getElementById("screenContainer");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const jumpSelect = document.getElementById("jumpSelect");
const screenPill = document.getElementById("screenPill");
const progressPill = document.getElementById("progressPill");
const progressBar = document.getElementById("progressBar");

function normalize(str){
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[.,;:¡!¿?()"]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function markDone(){
  state.done.add(state.current);
  updateProgress();
}

function updateProgress(){
  const pct = Math.round((state.done.size / screens.length) * 100);
  progressPill.textContent = "Progreso: " + pct + "%";
  progressBar.style.width = pct + "%";
}

function fillJump(){
  jumpSelect.innerHTML = "";
  screens.forEach((s,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = s.title;
    jumpSelect.appendChild(opt);
  });
  jumpSelect.value = state.current;
}

function setFeedback(id, ok, msg){
  const box = document.getElementById(id);
  if(!box) return;
  box.className = "feedback " + (ok ? "ok" : "bad");
  box.innerHTML = msg;
}

function toggleModel(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle("show");
}

function createDropdowns(blanks, prefix, title="Mini esquema a completar"){
  return `
    <div class="card">
      <h3>${title}</h3>
      <div class="blanks">
        ${blanks.map((b,i)=>`
          <div class="blank-row">
            <label for="${prefix}_blank_${i}">${b.label}</label>
            <select id="${prefix}_blank_${i}" onchange='checkSingleDropdown("${prefix}", ${i}, ${JSON.stringify(b).replace(/'/g,"&#39;")})'>
              <option value="">— Elige una opción —</option>
              ${b.options.map(op=>`<option value="${op.replace(/"/g,"&quot;")}">${op}</option>`).join("")}
            </select>
            <div class="mini-state" id="${prefix}_state_${i}">Pendiente</div>
          </div>
        `).join("")}
      </div>
      <div class="actions">
        <button class="btn-primary" onclick='checkAllDropdowns("${prefix}", ${JSON.stringify(blanks).replace(/'/g,"&#39;")})'>Corregir esquema completo</button>
      </div>
      <div class="feedback" id="${prefix}_blank_feedback"></div>
    </div>
  `;
}

      ${mcq.map((q,i)=>`

function renderScreen(){
  const s = screens[state.current];
  const prefix = "s" + state.current;

  screenPill.textContent = `${s.title} · ${state.current + 1}/${screens.length}`;
  jumpSelect.value = state.current;

  let html = `
    <div class="screen-head">
      <div>
        <h2>${s.title}</h2>
        <p>${s.subtitle}</p>
      </div>
      <span class="pill">${s.type === "challenge" ? "Reto acumulativo" : s.type === "final" ? "Examen final" : "Pantalla de estudio"}</span>
    </div>
  `;

  if(s.type === "normal"){
    html += `
      <div class="grid">
        <div>
          <div class="card lead">
            <h3>A. Texto breve</h3>
            <p>${s.text}</p>
          </div>

          ${createDropdowns(s.blanks,prefix,"B. Esquema con desplegables")}
          ${createMCQ(s.mcq,prefix,"C. Tres preguntas tipo test")}
          ${createTF(s.tf,prefix,"D. Dos verdadero o falso")}
        </div>

        <div>
          ${createShort(s.short,prefix,"E-F. Dos preguntas cortas + modelos")}
          ${createMiniExam(s,prefix)}
        </div>
      </div>
    `;
  }else if(s.type === "challenge"){
    html += createChallenge(s,prefix);
  }else if(s.type === "final"){
    html += createFinalExam(prefix);
  }

  html += `
    <div class="meta-nav">
      <button class="btn-secondary" ${state.current===0 ? "disabled" : ""} onclick="goPrev()">← Anterior</button>
      <button class="btn-primary" ${state.current===screens.length-1 ? "disabled" : ""} onclick="goNext()">Siguiente →</button>
    </div>
  `;

  screenContainer.innerHTML = html;
  prevBtn.disabled = state.current===0;
  nextBtn.disabled = state.current===screens.length-1;
}

function checkSingleDropdown(prefix, index, rawBlank){
  const blank = typeof rawBlank === "string" ? JSON.parse(rawBlank) : rawBlank;
  const select = document.getElementById(`${prefix}_blank_${index}`);
  const stateBox = document.getElementById(`${prefix}_state_${index}`);
  if(!select || !stateBox) return false;

  const value = normalize(select.value);
  const good = blank.answers.some(a => normalize(a) === value);

  select.style.borderColor = good ? "#8fc79b" : (value ? "#d7a18f" : "#dfc9b1");
  select.style.background = good ? "#f2fbf5" : (value ? "#fff4f1" : "white");

  if(!value){
    stateBox.className = "mini-state";
    stateBox.textContent = "Pendiente";
    return false;
  }

  stateBox.className = "mini-state " + (good ? "ok" : "bad");
  stateBox.textContent = good ? "Correcto" : "Revisa";
  return good;
}

function checkAllDropdowns(prefix, raw){
  const blanks = typeof raw === "string" ? JSON.parse(raw) : raw;
  let score = 0;

  blanks.forEach((b,i)=>{
    const good = checkSingleDropdown(prefix, i, b);
    if(good) score++;
  });

  const ok = score === blanks.length;
  setFeedback(
    `${prefix}_blank_feedback`,
    ok,
    ok ? `Muy bien: ${score}/${blanks.length}. Esquema perfecto.` : `Has acertado ${score}/${blanks.length}. Revisa las opciones marcadas en rojo.`
  );

  if(ok) markDone();
}

function checkMCQ(prefix, raw){
  const mcq = typeof raw === "string" ? JSON.parse(raw) : raw;
  let score = 0;

  mcq.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="${prefix}_mcq_${i}"]:checked`);
    if(sel && Number(sel.value) === q.correct) score++;
  });

  const ok = score === mcq.length;
  setFeedback(`${prefix}_mcq_feedback`, ok, ok ? `Excelente: ${score}/${mcq.length}.` : `Resultado: ${score}/${mcq.length}.`);
  if(ok) markDone();
}

function checkTF(prefix, raw){
  const tf = typeof raw === "string" ? JSON.parse(raw) : raw;
  let score = 0;

  tf.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="${prefix}_tf_${i}"]:checked`);
    if(sel && sel.value === String(q.correct)) score++;
  });

  const ok = score === tf.length;
  setFeedback(`${prefix}_tf_feedback`, ok, ok ? `Perfecto: ${score}/${tf.length}.` : `Has acertado ${score}/${tf.length}.`);
  if(ok) markDone();
}

function checkMiniExam(prefix, rawMcq, rawBlank, rawTf){
  const mcqItem = typeof rawMcq === "string" ? JSON.parse(rawMcq) : rawMcq;
  const blankItem = typeof rawBlank === "string" ? JSON.parse(rawBlank) : rawBlank;
  const tfItem = typeof rawTf === "string" ? JSON.parse(rawTf) : rawTf;

  let score = 0;

  const mcqSel = document.querySelector(`input[name="${prefix}_exam_mcq"]:checked`);
  if(mcqSel && Number(mcqSel.value) === mcqItem.correct) score++;

  const blankVal = normalize(document.getElementById(`${prefix}_exam_blank`).value);
  if(blankItem.answers.some(a => normalize(a) === blankVal)) score++;

  const tfSel = document.querySelector(`input[name="${prefix}_exam_tf"]:checked`);
  if(tfSel && tfSel.value === String(tfItem.correct)) score++;

  const shortVal = document.getElementById(`${prefix}_exam_short`).value.trim();
  if(shortVal.length >= 12) score++;

  const ok = score >= 3;
  setFeedback(`${prefix}_exam_feedback`, ok, ok ? `Buen trabajo: ${score}/4.` : `Has conseguido ${score}/4. Repite después de repasar.`);
  if(ok) markDone();
}

function markCurrentDone(){
  markDone();
  alert("Pantalla marcada como terminada.");
}

function goPrev(){
  if(state.current > 0){
    state.current--;
    renderScreen();
  }
}

function goNext(){
  if(state.current < screens.length - 1){
    state.current++;
    renderScreen();
  }
}

prevBtn.addEventListener("click", goPrev);
nextBtn.addEventListener("click", goNext);
jumpSelect.addEventListener("change", e=>{
  state.current = Number(e.target.value);
  renderScreen();
});
